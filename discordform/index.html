<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loginform">
        <form action="">
            <h1>Create an account</h1>
            <div class="formfield">
                <label for="email">EMAIL <span class="required">*</span></label>
                <input type="email" required>
            </div>
            <div class="formfield">
                <label for="displayname">DISPLAY NAME</label>
                <input type="text">
            </div>
            <div class="formfield">
                <label for="username">USERNAME <span class="required">*</span></label>
                <input type="text" required>
            </div>
            <div class="formfield">
                <label for="password">PASSWORD <span class="required">*</span></label>
                <input type="password" required>
            </div>
            <div class="formfield space-around">
                <label for="dateofbirth">DATE OF BIRTH <span class="required">*</span></label>
                <div class="datefields flex space-between">
                    <select name="month" id="month" required>
                        <option value="january">January</option>
                        <option value="february">February</option>
                        <option value="march">March</option>
                        <option value="april">April</option>
                        <option value="may">May</option>
                        <option value="june">June</option>
                        <option value="july">July</option>
                        <option value="august">August</option>
                        <option value="september">September</option>
                        <option value="october">October</option>
                        <option value="november">November</option>
                        <option value="december">December</option>
                    </select>
                    <select class="datefields_select" name="day" id="day" required>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                        <option value="17">17</option>
                        <option value="18">18</option>
                        <option value="19">19</option>
                        <option value="20">20</option>
                        <option value="21">21</option>
                        <option value="22">22</option>
                        <option value="23">23</option>
                        <option value="24">24</option>
                        <option value="25">25</option>
                        <option value="26">26</option>
                        <option value="27">27</option>
                        <option value="28">28</option>
                        <option value="29">29</option>
                        <option value="30">30</option>
                        <option value="31">31</option>
                    </select>
                    <select name="year" id="year" required>
                        <option value="1995">1995</option>
                        <option value="1996">1996</option>
                        <option value="1997">1997</option>
                        <option value="1998">1998</option>
                        <option value="1999">1999</option>
                        <option value="2000">2000</option>
                        <option value="2001">2001</option>
                        <option value="2002">2002</option>
                        <option value="2003">2003</option>
                        <option value="2004">2004</option>
                        <option value="2005">2005</option>
                        <option value="2006">2006</option>
                        <option value="2007">2007</option>
                        <option value="2008">2008</option>
                        <option value="2009">2009</option>
                        <option value="2010">2010</option>
                    </select>
                </div>
            </div>
            <div class="formfield">
                <div class="checkbox">
                    <input type="checkbox" id="newsletter">
                    <label for="newsletter">(Optional) it's okay to send me emails with Discord updates, tips and special offers. You can opt out at any time</label>
                </div>
            </div>
            <div class="formfield">
                <button>Continue</button>
            </div>
            <div class="formfield">
                <div class="checkbox">
                    <input type="checkbox" id="tos" required>
                    <label for="tos">I have read and agree to Discord's <a href="">Terms of Service</a> and <a href="">Privacy Policy</a></label>
                </div>
            </div>
            <div class="formfield">
                <a href="">Already have an account?</a>
            </div>
        </form>
    </div>
</body>
</html>
